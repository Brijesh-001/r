<!DOCTYPE html>
<html lang="en">
<head>


  <script src="aframe.min.js"></script>
</head>

<body>
  <a-scene >

    <!-- Camera -->
    <a-entity position="0 1.6 4">
      <a-camera></a-camera>
    </a-entity>

    <!-- Lights -->
    <a-light type="directional" position="1 1 1" intensity="0.9"></a-light>
    <a-light type="ambient" intensity="0.5"></a-light>

    <!-- Rotating Box -->
    <a-box
      position="0 1 -3"
      rotation="0 45 0"
      color="#737373"
      
      animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
    </a-box>

    <!-- Rotating Cone -->
    <a-cone
      position="1.5 1.5 -4"
      radius-bottom="0.6"
      height="1.6"
      color="#b30059"
      
      animation="property: position; to: 3 1.5 -4; dir: alternate; loop: true; dur: 1200; easing: easeInOutSine">
    </a-cone>

    <!-- Rotating Triangle -->
    <a-triangle
      position="1 1 -1"

      color="#ccffff"
      
      animation="property: rotation; to: 0 360 0; loop: true; dur: 1500">
    </a-triangle>

    <!-- Rotating Cylinder -->
    <a-cylinder
      position="-2 1 -3"
      radius="0.5"
      height="1.5"
      color="#800000"
      
      animation="property: rotation; to: 360 0 0; loop: true; dur: 1500">
    </a-cylinder>

    <!-- Bouncing Sphere -->
    <a-sphere
      position="0 2.5 -3"
      radius="0.6"
      color="#009999"
      
      animation="property: position; to: 0 3.2 -3; dir: alternate; loop: true; dur: 1200">
    </a-sphere>

    <!-- Ground Plane -->
    <a-plane
      position="0 0 -4"
      rotation="-90 0 0"
      width="12"
      height="12"
      color="#ffcccc"
      
    </a-plane>

  </a-scene>
</body>
</html>
