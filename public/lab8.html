<!doctype html>
<html>
<head>
  <title>A-Frame Geolocation (Sphere, Torus, Cone)</title>

  <!-- A-Frame -->
  <script src="/aframe.min.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', function () {

      function showShapes(position) {
        var currentLatitude = position.coords.latitude;
        var currentLongitude = position.coords.longitude;

        console.log("Latitude:", currentLatitude);
        console.log("Longitude:", currentLongitude);

        document.getElementById('currentLocation').innerHTML =
          `Lat: ${currentLatitude.toFixed(6)}, Lon: ${currentLongitude.toFixed(6)}`;

        var locations = [
          { id: "sphere", lat: 12.905560, lon: 77.566040, threshold: 0.005 },
          { id: "torus",  lat: 122.873930, lon: 772.553514, threshold: 0.005 },
          { id: "cone",   lat: 122.873831, lon: 772.553439, threshold: 0.005 }
        ];

        locations.forEach(location => {
          var shape = document.querySelector(`#${location.id}`);

          if (
            shape &&
            Math.abs(currentLatitude - location.lat) < location.threshold &&
            Math.abs(currentLongitude - location.lon) < location.threshold
          ) {
            shape.setAttribute('visible', true);
          }
        });
      }

      function locationError(error) {
        console.error("Error getting location:", error);
        document.getElementById('currentLocation').innerHTML =
          `Error getting location: ${error.message}`;
      }

      function getLocation() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            showShapes,
            locationError,
            {
              enableHighAccuracy: true,
              timeout: 10000,
              maximumAge: 0
            }
          );
        } else {
          document.getElementById('currentLocation').innerHTML =
            "Geolocation is not supported by this browser.";
        }
      }

      getLocation();
    });
  </script>
</head>

<body>
  <h3 id="currentLocation">Fetching location...</h3>

  <a-scene>
    <!-- Sphere -->
    <a-sphere
      id="sphere"
      position="0 0.75 -3"
      radius="0.75"
      color="green"
      visible="false">
    </a-sphere>

    <!-- Torus -->
    <a-torus
      id="torus"
      position="2 1 -3"
      radius="0.6"
      radius-tubular="0.15"
      color="purple"
      visible="false">
    </a-torus>

    <!-- Cone -->
    <a-cone
      id="cone"
      position="-2 0.75 -3"
      radius-bottom="0.6"
      height="1.5"
      color="orange"
      visible="false">
    </a-cone>

    <!-- Camera -->
    <a-camera gps-camera rotation-reader></a-camera>
  </a-scene>
</body>
</html>
