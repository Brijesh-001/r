<!DOCTYPE html>
<html>
<head>
  <title>A-Frame Hover Torus to Moving Sphere</title>

  <script src="aframe.min.js"></script>

  <script>
    // Hover color change component
    AFRAME.registerComponent('hover-color', {
      init: function () {
        const el = this.el;
        const originalColor = el.getAttribute('material').color;

        el.addEventListener('mouseenter', () => {
          el.setAttribute('material', 'color', '#990000'); 
        });

        el.addEventListener('mouseleave', () => {
          el.setAttribute('material', 'color', originalColor);
        });
      }
    });

    // Click scale toggle for box
    AFRAME.registerComponent('click-scale-toggle', {
      init: function () {
        const el = this.el;
        let scaled = false;

        el.addEventListener('click', () => {
          if (!scaled) {
            el.setAttribute('scale', '2 2 2');
          } else {
            el.setAttribute('scale', '1 1 1');
          }
          scaled = !scaled;
        });
      }
    });

    // Torus hover -> replace with moving sphere
    AFRAME.registerComponent('torus-to-sphere', {
      init: function () {
        const torus = this.el;
        const sphere = document.querySelector('#hoverSphere');

        torus.addEventListener('mouseenter', () => {
          torus.setAttribute('visible', false);
          sphere.setAttribute('visible', true);
          sphere.emit('startMove');
        });

        torus.addEventListener('mouseleave', () => {
          torus.setAttribute('visible', true);
          sphere.setAttribute('visible', false);
        });
      }
    });
  </script>
</head>

<body>
  <a-scene>

    <!-- Camera -->
    <a-camera position="0 1.6 4"
              cursor="rayOrigin: mouse"
              raycaster="objects: .interactive">
    </a-camera>

    <!-- Lights -->
    <a-light type="directional" position="1 1 1" intensity="0.9"></a-light>
    <a-light type="ambient" intensity="0.5"></a-light>

    <!-- Cube (light red) -->
    <a-box class="interactive"
           position="-1.8 1 -3"
           material="color: #ffb3b3"
           click-scale-toggle>
    </a-box>

    <!-- Cylinder (light green) -->
    <a-cylinder class="interactive"
                position="0 1 -3"
                radius="0.5"
                height="1.5"
                material="color: #82E0AA"
                hover-color>
    </a-cylinder>

    <!-- Torus (light yellow) -->
    <a-torus class="interactive"
             position="1.8 1.2 -3"
             radius="0.7"
             radius-tubular="0.25"
             material="color: #F7DC6F"
             torus-to-sphere>
    </a-torus>

    <!-- Sphere appears on hover -->
    <a-sphere id="hoverSphere"
              visible="false"
              position="1.8 1.2 -3"
              radius="0.5"
              material="color: #85C1E9"
              animation__move="property: position;
                               to: 1.8 2.2 -3;
                               dir: alternate;
                               loop: true;
                               dur: 800;
                               startEvents: startMove">
    </a-sphere>

    <!-- Ground -->
    <a-plane position="0 0 -4"
             rotation="-90 0 0"
             width="10"
             height="10"
             material="color: #D5F5E3">
    </a-plane>

  </a-scene>
</body>
</html>
