<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multiple Image Based AR</title>

<script src="aframe.min.js"></script>
<script src="mindar-image-aframe.prod.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}
</style>
</head>

<body>

<a-scene
mindar-image="imageTargetSrc: target.mind;"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false">

<a-camera position="0 0 0" look-controls="false"></a-camera>

<!-- First Image Target -->
<a-entity mindar-image-target="targetIndex: 0">
<a-torus position="0 0 0" radius="0.5" radius-tubular="0.15" color="#ff9900"
animation="property: rotation; to: 0 360 0; loop:true; dur:2500">
</a-torus>
</a-entity>

<!-- Second Image Target -->
<a-entity mindar-image-target="targetIndex: 1">
<a-sphere position="0 0 0" radius="0.5" color="#3399ff"
animation="property: position; to: 0 0.5 0; dir:alternate; loop:true; dur:1000">
</a-sphere>
</a-entity>

</a-scene>

</body>
</html>
